<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約アプリ</title>
<style>
body { font-family: Arial; background:#f3f4f6; margin:0; padding:20px; }
.card { background:white; padding:15px; border-radius:16px; margin-bottom:10px; }
button { background:#16a34a; color:white; padding:10px; border:none; border-radius:8px; cursor:pointer; }
input, select { width:100%; padding:8px; margin:5px 0; border-radius:8px; border:1px solid #ccc; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="card">
  <h2>ログイン</h2>
  <input id="email" placeholder="メール">
  <button onclick="login()">ログイン</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <h2>👤 <span id="user"></span></h2>

  <button onclick="show('home')">ホーム</button>
  <button onclick="show('medical')">予約</button>
  <button onclick="show('booking')">一覧</button>
  <button onclick="show('tourism')">マップ</button>

  <!-- HOME -->
  <div id="home" class="card">
    <h2>ホーム</h2>
    <button onclick="openBooking('中標津町')">中標津町を予約</button>
  </div>

  <!-- BOOK FORM -->
  <div id="medical" class="card" style="display:none;">
    <h2>予約</h2>
    <input id="place" placeholder="場所">
    <input id="date" type="date">
    <input id="time" type="time">
    <button onclick="book()">予約する</button>
  </div>

  <!-- BOOK LIST -->
  <div id="booking" class="card" style="display:none;">
    <h2>予約一覧</h2>
    <div id="bookingList"></div>
  </div>

  <!-- MAP -->
  <div id="tourism" class="card" style="display:none;">
    <h2>🗺️ マップ</h2>
    <iframe src="https://www.google.com/maps?q=中標津町&output=embed" width="100%" height="300" style="border:0;border-radius:12px;"></iframe>
  </div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
  <div style="background:white; padding:20px; border-radius:16px; width:90%; max-width:400px;">
    <h2 style="color:#15803d;">✅ 予約完了</h2>
    <p id="info"></p>
    <iframe id="mapFrame" width="100%" height="200" style="border:0;border-radius:10px;"></iframe>
    <br><br>
    <a id="routeLink" target="_blank">📍 ルートを表示</a>
    <br><br>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
let bookings = [];

function login(){
  const email = document.getElementById('email').value;
  if(email){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('user').innerText = email;
  }
}

function show(section){
  const sections = ['home','medical','booking','tourism'];
  sections.forEach(id => document.getElementById(id).style.display='none');
  document.getElementById(section).style.display='block';
}

function openBooking(place){
  show('medical');
  document.getElementById('place').value = place;
}

function book(){
  const place = document.getElementById('place').value;
  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;

  if(!place || !date || !time){
    alert('全て入力してください');
    return;
  }

  const data = {place, date, time};
  bookings.push(data);
  renderBookings();

  const encodedPlace = encodeURIComponent(place);

  document.getElementById('info').innerText = `${place}\n${date} ${time}`;
  document.getElementById('mapFrame').src = `https://www.google.com/maps?q=${encodedPlace}&output=embed`;
  document.getElementById('routeLink').href = `https://www.google.com/maps/dir/?api=1&destination=${encodedPlace}`;

  document.getElementById('modal').style.display='flex';
}

function renderBookings(){
  const container = document.getElementById('bookingList');
  container.innerHTML = '';

  bookings.forEach((b,i)=>{
    container.innerHTML += `
    <div class="card">
      <h3>${b.place}</h3>
      <p>📅 <input type="date" value="${b.date}" onchange="updateDate(${i}, this.value)"></p>
      <p>⏰ <input type="time" value="${b.time}" onchange="updateTime(${i}, this.value)"></p>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(b.place)}" target="_blank">🚗 ルート</a>
    </div>`;
  });
}

function updateDate(i,val){ bookings[i].date = val; }
function updateTime(i,val){ bookings[i].time = val; }

function closeModal(){
  document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
